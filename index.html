<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>SEEK MENU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: transparent; 
            overflow: hidden; 
            display: flex; 
            justify-content: flex-end; /* Îl mută în dreapta */
            align-items: center;    /* Îl centrează pe verticală (la mijloc) */
            height: 100vh; 
            padding-right: 50px;    /* Distanța față de marginea din dreapta */
        }

        #menu-container {
            width: 320px;           /* Lățime redusă (era 420px) */
            background: #0f0f0f;
            border-radius: 10px;
            border: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        .header {
            padding: 20px;          /* Padding redus */
            text-align: right;
            background: #0f0f0f;
        }

        .header h1 {
            color: white;
            font-weight: 900;
            font-size: 18px;        /* Font mai mic */
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header h1 span { color: #f2d011; }

        .tabs-nav {
            display: flex;
            background: #141414;
            border-bottom: 1px solid #1a1a1a;
        }

        .tab-button {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #444;
            font-weight: 700;
            font-size: 9px;         /* Font tab-uri mai mic */
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab-button.active {
            color: #fff;
            background: #1d1d1d;
        }

        .content-area {
            padding: 15px;
            background: #0f0f0f;
            min-height: 300px;      /* Înălțime minimă ajustată */
        }

        .section-header {
            font-size: 9px;
            font-weight: 800;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin: 10px 0 8px 5px;
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 15px;     /* Rânduri mai compacte */
            background: #141414;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid transparent;
            transition: 0.1s;
        }

        .action-row .label { color: #bbb; font-size: 11px; font-weight: 500; }
        .action-row .value { color: #eee; font-size: 10px; font-weight: 700; }

        .action-row.selected {
            border-color: #f2d011;
            background: #1a1a1a;
        }

        .toggle-bg {
            width: 36px;            /* Toggle mai mic */
            height: 18px;
            background: #333;
            border-radius: 9px;
            position: relative;
        }

        .toggle-dot {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 3px;
            left: 3px;
            transition: 0.2s;
        }

        .on .toggle-bg { background: #fff; }
        .on .toggle-dot { left: 21px; background: #000; }

        .footer {
            padding: 12px 20px;
            background: #0f0f0f;
            border-top: 1px solid #141414;
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: #222;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="menu-container">
    <div class="header">
        <h1>SEEK <span>MENU</span></h1>
    </div>
    
    <div class="tabs-nav">
        <div class="tab-button active">MAIN</div>
        <div class="tab-button">OUTFIT</div>
        <div class="tab-button">ANIMS</div>
        <div class="tab-button">MISC</div>
    </div>

    <div class="content-area">
        <div id="tab-0" class="tab-content active">
            <div class="section-header">QUICK ACTIONS</div>
            <div class="action-row" data-action="heal">
                <div class="label">Heal Player</div>
                <div class="value">Heal</div>
            </div>
            <div class="action-row" data-action="armor">
                <div class="label">Armor Player</div>
                <div class="value">Armor</div>
            </div>
            
            <div class="section-header">TOGGLES</div>
            <div class="action-row" data-action="godmode">
                <div class="label">Godmode</div>
                <div class="toggle-bg"><div class="toggle-dot"></div></div>
            </div>
            <div class="action-row" data-action="thermal">
                <div class="label">Thermal Vision</div>
                <div class="toggle-bg"><div class="toggle-dot"></div></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div>SEEK | 3.0.1</div>
    </div>
</div>

<script>
    let currentTab = 0;
    let currentIndex = 0;

    function updateUI() {
        const activeTab = document.querySelector('.tab-content.active');
        const rows = activeTab.querySelectorAll('.action-row');
        
        if (currentIndex >= rows.length) currentIndex = 0;
        if (currentIndex < 0) currentIndex = rows.length - 1;

        rows.forEach((row, i) => {
            row.classList.toggle('selected', i === currentIndex);
        });
    }

    function sendToLua(actionName) {
        fetch(`https://kronos_grill/executeAction`, {
            method: 'POST',
            body: JSON.stringify({ action: actionName })
        }).catch(() => {});
    }

    function handleNavigation(key) {
        const activeTab = document.querySelector('.tab-content.active');
        const rows = activeTab.querySelectorAll('.action-row');

        if (key === "ArrowDown") currentIndex++;
        else if (key === "ArrowUp") currentIndex--;
        else if (key === "Enter") {
            const row = rows[currentIndex];
            const action = row.getAttribute('data-action');
            sendToLua(action);
            if (row.querySelector('.toggle-bg')) row.classList.toggle('on');
        }
        updateUI();
    }

    window.addEventListener('message', (e) => {
        if (e.data.type === 'keydown') handleNavigation(e.data.key);
    });
    updateUI();
</script>
</body>
</html>
