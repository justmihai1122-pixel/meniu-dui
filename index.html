<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Macho Navigation Menu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: transparent; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }

        #menu-container {
            width: 450px; height: 550px;
            background: #121212; border: 2px solid #8934eb;
            display: flex; flex-direction: column;
            box-shadow: 0 0 20px rgba(137, 52, 235, 0.5);
        }

        .header { background: #1a1a1a; padding: 15px; text-align: center; color: #8934eb; font-weight: bold; border-bottom: 1px solid #333; }

        .tabs-nav { display: flex; background: #1a1a1a; border-bottom: 1px solid #8934eb; }
        .tab-button { flex: 1; padding: 10px; border: none; background: none; color: #666; font-weight: bold; }
        .tab-button.active { color: #8934eb; border-bottom: 2px solid #8934eb; }

        .content-area { flex: 1; padding: 20px; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* STIL PENTRU BUTONUL SELECTAT CU SĂGEȚILE */
        .btn {
            width: 100%; padding: 12px; margin-bottom: 8px;
            background: #252525; border: 1px solid #333;
            color: white; text-align: left; border-radius: 4px;
        }
        .btn.selected {
            background: #ffffff !important;
            color: #8934eb !important;
            font-weight: bold;
            transform: scale(1.02);
            border: 1px solid #8934eb;
        }
    </style>
</head>
<body>

<div id="menu-container">
    <div class="header">MACHO INJECTED MENU</div>
    <div class="tabs-nav" id="nav-bar">
        <button class="tab-button active">MAIN</button>
        <button class="tab-button">VISUALS</button>
        <button class="tab-button">MISC</button>
    </div>

    <div class="content-area">
        <div id="tab-0" class="tab-content active">
            <button class="btn" onclick="console.log('GodMode')">God Mode</button>
            <button class="btn" onclick="console.log('Invis')">Invisibility</button>
            <button class="btn" onclick="console.log('Heal')">Heal Player</button>
        </div>
        <div id="tab-1" class="tab-content">
            <button class="btn">Wallhack</button>
            <button class="btn">Box ESP</button>
        </div>
        <div id="tab-2" class="tab-content">
            <button class="btn">No Recoil</button>
            <button class="btn">Super Speed</button>
        </div>
    </div>
</div>

<script>
    let currentTab = 0;
    let currentIndex = 0;

    function updateUI() {
        // Update Tab-uri
        document.querySelectorAll('.tab-content').forEach((t, i) => t.classList.toggle('active', i === currentTab));
        document.querySelectorAll('.tab-button').forEach((b, i) => b.classList.toggle('active', i === currentTab));
        
        // Update Butoane din tab-ul activ
        const activeTab = document.querySelector('.tab-content.active');
        const buttons = activeTab.querySelectorAll('.btn');
        
        // Reset index dacă schimbăm tab-ul
        if (currentIndex >= buttons.length) currentIndex = 0;

        buttons.forEach((btn, i) => btn.classList.toggle('selected', i === currentIndex));
    }

    window.addEventListener('keydown', function(e) {
        const activeTab = document.querySelector('.tab-content.active');
        const buttons = activeTab.querySelectorAll('.btn');

        if (e.key === "ArrowDown") {
            currentIndex = (currentIndex + 1) % buttons.length;
        } else if (e.key === "ArrowUp") {
            currentIndex = (currentIndex - 1 + buttons.length) % buttons.length;
        } else if (e.key === "ArrowRight") {
            currentTab = (currentTab + 1) % 3;
            currentIndex = 0;
        } else if (e.key === "ArrowLeft") {
            currentTab = (currentTab - 1 + 3) % 3;
            currentIndex = 0;
        } else if (e.key === "Enter") {
            buttons[currentIndex].click();
        }
        updateUI();
    });

    updateUI(); // Initial call
</script>
</body>
</html>
