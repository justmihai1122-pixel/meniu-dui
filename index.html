<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Macho Arrow Menu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: transparent; overflow: hidden; display: flex; justify-content: flex-start; align-items: center; height: 100vh; padding-left: 50px; }

        #menu-container {
            width: 400px; height: 500px;
            background: rgba(18, 18, 18, 0.95); border: 2px solid #8934eb;
            display: flex; flex-direction: column;
            box-shadow: 0 0 20px rgba(137, 52, 235, 0.6);
            border-radius: 5px;
        }

        .header { background: #1a1a1a; padding: 15px; text-align: center; color: #8934eb; font-weight: bold; font-size: 18px; border-bottom: 1px solid #333; }

        .tabs-nav { display: flex; background: #1a1a1a; border-bottom: 1px solid #8934eb; }
        .tab-button { flex: 1; padding: 12px; border: none; background: none; color: #555; font-weight: bold; transition: 0.2s; font-size: 12px; }
        .tab-button.active { color: #8934eb; background: #252525; border-bottom: 3px solid #8934eb; }

        .content-area { flex: 1; padding: 15px; color: white; overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .btn {
            width: 100%; padding: 12px; margin-bottom: 8px;
            background: #222; border: 1px solid #333;
            color: #eee; text-align: left; border-radius: 3px;
            font-size: 14px; transition: 0.1s;
        }

        /* Stilul pentru butonul selectat cu săgețile */
        .btn.selected {
            background: #ffffff !important;
            color: #8934eb !important;
            font-weight: bold;
            border: 1px solid #8934eb;
            transform: translateX(5px);
        }
    </style>
</head>
<body>

<div id="menu-container">
    <div class="header">MACHO CONTROLS</div>
    <div class="tabs-nav">
        <div class="tab-button active">MAIN</div>
        <div class="tab-button">VISUALS</div>
        <div class="tab-button">MISC</div>
    </div>

    <div class="content-area">
        <div id="tab-0" class="tab-content active">
            <button class="btn">God Mode</button>
            <button class="btn">Invisibility</button>
            <button class="btn">Heal Player</button>
            <button class="btn">Armor Max</button>
        </div>
        <div id="tab-1" class="tab-content">
            <button class="btn">Player ESP</button>
            <button class="btn">Box ESP</button>
            <button class="btn">Lines</button>
        </div>
        <div id="tab-2" class="tab-content">
            <button class="btn">Super Jump</button>
            <button class="btn">Fast Run</button>
            <button class="btn">No Recoil</button>
        </div>
    </div>
</div>

<script>
    let currentTab = 0;
    let currentIndex = 0;
    const tabCount = 3;

    function updateUI() {
        // Update Tab-uri
        document.querySelectorAll('.tab-content').forEach((t, i) => t.classList.toggle('active', i === currentTab));
        document.querySelectorAll('.tab-button').forEach((b, i) => b.classList.toggle('active', i === currentTab));
        
        // Update Butoane
        const activeTab = document.querySelector('.tab-content.active');
        const buttons = activeTab.querySelectorAll('.btn');
        
        if (currentIndex >= buttons.length) currentIndex = 0;
        if (currentIndex < 0) currentIndex = buttons.length - 1;

        buttons.forEach((btn, i) => btn.classList.toggle('selected', i === currentIndex));
    }
    window.focus();
    
    window.addEventListener('keydown', function(e) {
        const activeTab = document.querySelector('.tab-content.active');
        const buttons = activeTab.querySelectorAll('.btn');

        if (e.key === "ArrowDown") {
            currentIndex = (currentIndex + 1) % buttons.length;
        } else if (e.key === "ArrowUp") {
            currentIndex = (currentIndex - 1 + buttons.length) % buttons.length;
        } else if (e.key === "ArrowRight") {
            currentTab = (currentTab + 1) % tabCount;
            currentIndex = 0;
        } else if (e.key === "ArrowLeft") {
            currentTab = (currentTab - 1 + tabCount) % tabCount;
            currentIndex = 0;
        } else if (e.key === "Enter") {
            console.log("Activat: " + buttons[currentIndex].innerText);
            // Aici poți adăuga logica de activare (fetch către un local server etc)
        }
        updateUI();
    });

    updateUI();
</script>
</body>
</html>
