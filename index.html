<!DOCTYPE html>
<html>
<head>
    <style>
        html, body {
            background-color: rgba(0, 0, 0, 0) !important; /* Transparenta totala */
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Previne scrollbar-urile care pot strica randarea */
        }
        
        #menu-container {
            /* Asigura-te ca containerul are o pozitie fixa pe ecran */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .header {
            background: #8934eb;
            padding: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="menu-container">
        <div class="header">MACHO DUI MENU</div>
        <p>Apasă INSERT pentru a închide1.</p>
    </div>

    <script>
        // Ascultăm mesajele trimise prin MachoSendDuiMessage
        window.addEventListener("message", function(event) {
            let data = JSON.parse(event.data);
            if (data.action === "open") {
                console.log("Meniul a fost deschis!");
            }
        });
    </script>
</body>
</html>
