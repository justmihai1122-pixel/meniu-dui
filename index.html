<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Macho Clara Menu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background: transparent; overflow: hidden; height: 100vh; display: flex; align-items: center; padding-left: 100px; }

        #menu-container {
            width: 450px; height: 620px;
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            color: #ccc;
        }

        .header-logo {
            padding: 20px; background: rgba(0, 0, 0, 0.5);
            text-align: right; color: #fff; font-weight: 900;
            font-size: 26px; text-transform: uppercase;
            letter-spacing: 2px;
        }
        .header-logo span { color: rgb(255, 215, 0); }

        .tabs-nav { display: flex; background: rgba(10, 10, 10, 0.7); }
        .tab-button {
            flex: 1; padding: 15px; border: none; background: none;
            color: #666; font-weight: bold; font-size: 13px;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .tab-button.active { color: #fff; background: rgba(30, 30, 30, 0.8); }

        .content-area { flex: 1; padding: 25px; overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .section-header {
            font-size: 11px; font-weight: bold; color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px;
        }

        .action-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(25, 25, 25, 0.6);
            border-radius: 6px; margin-bottom: 12px; border: 1px solid transparent;
            font-size: 14px;
        }
        .action-row.selected {
            background: rgba(40, 40, 40, 0.8);
            border-color: rgba(255, 215, 0, 0.3);
            color: #fff;
        }

        .toggle-switch {
            width: 50px; height: 26px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 13px; position: relative;
            transition: 0.3s;
        }
        .toggle-switch.on { background: rgba(255, 215, 0, 0.8); }
        .toggle-switch::after {
            content: ""; position: absolute;
            width: 20px; height: 20px;
            background: #fff; border-radius: 50%;
            top: 3px; left: 3px; transition: 0.3s;
        }
        .toggle-switch.on::after { left: 27px; background: rgb(0, 0, 0); }

        .footer {
            padding: 20px; background: rgba(0, 0, 0, 0.5);
            display: flex; justify-content: space-between;
            font-size: 11px; color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="menu-container">
    <div class="header-logo">Macho <span>Menu</span></div>
    <div class="tabs-nav">
        <div class="tab-button active">Main</div>
        <div class="tab-button">Outfit</div>
        <div class="tab-button">Anims</div>
        <div class="tab-button">Misc</div>
    </div>

    <div class="content-area">
        <div id="tab-0" class="tab-content active">
            <div class="section-header">Quick Actions</div>
            <div class="action-row" data-action="heal"><div class="row-label">Heal Player</div><div class="row-value">Heal</div></div>
            <div class="action-row" data-action="armor"><div class="row-label">Armor Player</div><div class="row-value">Armor</div></div>
            
            <div class="section-header">TOGGLES</div>
            <div class="action-row" data-action="godmode"><div class="row-label">Godmode</div><div class="toggle-switch"></div></div>
            <div class="action-row" data-action="thermal"><div class="row-label">Thermal Vision</div><div class="toggle-switch"></div></div>
        </div>
        <div id="tab-1" class="tab-content"></div>
        <div id="tab-2" class="tab-content"></div>
        <div id="tab-3" class="tab-content"></div>
    </div>

    <div class="footer">
        <div>Macho | Clara | 3.0.1</div>
        <div>DELETE - TOGGLE</div>
    </div>
</div>

<script>
    let currentTab = 0;
    let currentIndex = 0;
    const tabCount = 4;

    function updateUI() {
        document.querySelectorAll('.tab-content').forEach((t, i) => t.classList.toggle('active', i === currentTab));
        document.querySelectorAll('.tab-button').forEach((b, i) => b.classList.toggle('active', i === currentTab));
        
        const activeTab = document.querySelector('.tab-content.active');
        const rows = activeTab.querySelectorAll('.action-row');
        
        if (currentIndex >= rows.length) currentIndex = 0;
        if (currentIndex < 0) currentIndex = rows.length - 1;

        rows.forEach((row, i) => row.classList.toggle('selected', i === currentIndex));
    }

    function sendToLua(actionName) {
        fetch(`https://kronos_grill/executeAction`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: actionName })
        }).catch(err => console.log("Eroare NUI: " + err));
    }

    function handleNavigation(keyName) {
        const activeTab = document.querySelector('.tab-content.active');
        const rows = activeTab.querySelectorAll('.action-row');

        if (keyName === "ArrowDown") {
            currentIndex = (currentIndex + 1) % rows.length;
        } else if (keyName === "ArrowUp") {
            currentIndex = (currentIndex - 1 + rows.length) % rows.length;
        } else if (keyName === "ArrowRight") {
            currentTab = (currentTab + 1) % tabCount;
            currentIndex = 0;
        } else if (keyName === "ArrowLeft") {
            currentTab = (currentTab - 1 + tabCount) % tabCount;
            currentIndex = 0;
        } else if (keyName === "Enter") {
            if (rows[currentIndex]) {
                const action = rows[currentIndex].getAttribute('data-action');
                if (action) {
                    sendToLua(action);
                    // Actualizăm și vizual comutatorul (toggle-switch) dacă există
                    const toggle = rows[currentIndex].querySelector('.toggle-switch');
                    if (toggle) toggle.classList.toggle('on');
                }
            }
        }
        updateUI();
    }

    window.addEventListener('message', function(event) {
        if (event.data.type === 'keydown') {
            handleNavigation(event.data.key);
        }
    });

    window.addEventListener('keydown', (e) => handleNavigation(e.key));
    updateUI();
</script>
</body>
</html>
