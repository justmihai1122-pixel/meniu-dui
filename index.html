<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
<style>
    html, body {
        background-color: transparent !important;
        background: none !important;
        appearance: none;
    }
    /* Asigură-te că containerul tău are o poziție fixă */
    #menu-container {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 9999;
    }
</style>
</head>
<body>
    <div id="menu-container">
        <div class="header">MACHO DUI MENU</div>
        <div class="content">
            <p>Meniul a fost încărcat cu succes!</p>
            <p style="color: #8934eb;">Status: Online</p>
            <br>
            <p>Apasă <strong>DELETE</strong> pentru a închide.</p>
        </div>
        <div class="footer">v1.0.0 - Screenshot Proof</div>
    </div>

    <script>
        // Ascultă mesajele din Lua
        window.addEventListener("message", function(event) {
            try {
                let data = JSON.parse(event.data);
                if (data.action === "open") {
                    console.log("Meniul a primit semnalul de deschidere.");
                }
            } catch (e) {
                console.error("Eroare la procesarea mesajului din Lua");
            }
        });
    </script>
</body>
</html>
